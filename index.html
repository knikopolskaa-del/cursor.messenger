<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messenger V1</title>

    <!-- Tailwind via CDN for V1: fewer config files, fast iteration.
         Later you can switch to compiled Tailwind when you add a design system. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              "soft": "0 10px 30px rgba(0,0,0,.08)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
